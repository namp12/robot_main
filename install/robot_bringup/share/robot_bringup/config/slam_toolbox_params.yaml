# slam_toolbox_params.yaml
# Tuned parameters for RPLidar C1 on Raspberry Pi 4
# Used by online_async_launch.py in slam.launch.py

slam_toolbox:
  ros__parameters:

    # ---- Plugin ----
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None  # Huber can help with outliers

    # ---- Threading ----
    thread_num: 2  # RPi4 has 4 cores; leave 2 for other nodes

    # ---- Frame IDs ----
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true

    # ---- Motion / scan thresholds ----
    minimum_travel_distance: 0.2     # meters before a new scan is processed
    minimum_travel_heading: 0.2      # radians (~11 deg) before a new scan is processed
    scan_buffer_maximum_size: 10     # keep last 10 scans in working memory
    scan_buffer_size: 10
    scan_publisher_maximum_size: 10

    # ---- Laser parameters (RPLidar C1) ----
    # C1 specs: 12m range, ~8000 pts/s at 10Hz
    max_laser_range: 12.0
    minimum_time_interval: 0.05      # 20 Hz max update

    # ---- Map resolution ----
    resolution: 0.05                 # 5 cm per pixel (good balance for C1)

    # ---- Transform ----
    transform_publish_period: 0.05   # Publish map->odom at 20 Hz
    transform_timeout: 0.2

    # ---- Loop closure ----
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    # Correction threshold: only apply if correction > this
    loop_search_maximum_error: 2.0

    # ---- Debug ----
    debug_logging: false
